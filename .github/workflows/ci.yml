name: CI

on:
  push:
    branches:
      - main
      - epic/**
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install project
        run: pip install -e .

      - name: Run persistence baseline tests
        run: >
          pytest -q
          tests/test_sqlite_run_store.py
          tests/test_run_store_core_contract.py
          tests/test_run_store_concurrency.py
          tests/test_run_store_leases.py
          tests/test_storage_ordering.py